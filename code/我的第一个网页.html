<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📄 写完改HTML · 极简文本编辑器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1e1e2f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
      padding: 20px;
    }

    .editor-card {
      background: #2d2d44;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 8px 16px rgba(0, 0, 0, 0.4);
      padding: 28px 30px 35px;
      max-width: 820px;
      width: 100%;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .editor-header h1 {
      color: #f0eef7;
      font-weight: 500;
      font-size: 1.7rem;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .editor-header h1 span {
      background: #3f3f5e;
      padding: 0 14px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 400;
      color: #b7b2d9;
      letter-spacing: 0.3px;
      line-height: 32px;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      background: #3d3d5c;
      border: none;
      color: #e4e0f5;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 60px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.15s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.02);
      letter-spacing: 0.3px;
    }

    .btn:hover {
      background: #4e4e72;
      transform: scale(1.02);
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.08);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: #6c5ce7;
      color: white;
      box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
    }

    .btn-primary:hover {
      background: #7f70f5;
      box-shadow: 0 6px 16px rgba(108, 92, 231, 0.4);
    }

    .btn-success {
      background: #00b894;
      color: white;
      box-shadow: 0 4px 12px rgba(0, 184, 148, 0.25);
    }

    .btn-success:hover {
      background: #00d2a0;
      box-shadow: 0 6px 16px rgba(0, 184, 148, 0.35);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #55557a;
      box-shadow: none;
    }

    .btn-outline:hover {
      background: #3a3a57;
      border-color: #7777a0;
    }

    .textarea-wrapper {
      background: #1c1c2a;
      border-radius: 24px;
      padding: 8px;
      box-shadow: inset 0 6px 12px rgba(0, 0, 0, 0.5);
      border: 1px solid #3c3c58;
      transition: border 0.2s;
    }

    .textarea-wrapper:focus-within {
      border-color: #7f70f5;
      box-shadow: inset 0 6px 12px rgba(0, 0, 0, 0.5), 0 0 0 3px rgba(108, 92, 231, 0.2);
    }

    #editorTextarea {
      width: 100%;
      min-height: 360px;
      background: #14141f;
      border: none;
      border-radius: 18px;
      padding: 22px 24px;
      color: #eae6fd;
      font-size: 1rem;
      line-height: 1.7;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      resize: vertical;
      outline: none;
      transition: background 0.15s;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
      letter-spacing: 0.2px;
      tab-size: 2;
    }

    #editorTextarea::placeholder {
      color: #5a5a7a;
      font-weight: 300;
      font-family: 'Segoe UI', sans-serif;
      letter-spacing: 0.2px;
      opacity: 0.7;
    }

    #editorTextarea:focus {
      background: #181826;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      color: #8b87b0;
      font-size: 0.8rem;
      padding: 0 6px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .status-bar .hint {
      background: #25253b;
      padding: 6px 16px;
      border-radius: 40px;
      border: 1px solid #3e3e5a;
      color: #b3aedb;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-bar .hint i {
      font-style: normal;
      opacity: 0.7;
    }

    .status-bar .counter {
      background: #25253b;
      padding: 6px 18px;
      border-radius: 40px;
      border: 1px solid #3e3e5a;
    }

    .badge {
      background: #3b3b5a;
      padding: 2px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      color: #cbc6f0;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border: 1px solid #4f4f72;
    }

    .footer-note {
      text-align: center;
      margin-top: 20px;
      color: #59597a;
      font-size: 0.8rem;
      border-top: 1px solid #33334a;
      padding-top: 18px;
      letter-spacing: 0.2px;
    }

    .footer-note strong {
      color: #8a85b3;
      font-weight: 400;
    }

    /* 响应式微调 */
    @media (max-width: 550px) {
      .editor-card {
        padding: 20px 16px 25px;
      }
      .editor-header h1 {
        font-size: 1.3rem;
      }
      .btn {
        padding: 8px 14px;
        font-size: 0.8rem;
      }
      #editorTextarea {
        min-height: 260px;
        padding: 16px 18px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="editor-card">
    <!-- 头部 -->
    <div class="editor-header">
      <h1>
        ✎ 文本工坊
        <span>.txt</span>
      </h1>
      <div class="action-buttons">
        <button class="btn btn-outline" id="clearBtn" title="清空编辑器">🗑️ 清空</button>
        <button class="btn btn-primary" id="downloadTxtBtn">⬇️ 下载 .txt</button>
        <button class="btn btn-success" id="downloadHtmlBtn">🌐 下载 .html</button>
      </div>
    </div>

    <!-- 文本域 -->
    <div class="textarea-wrapper">
      <textarea id="editorTextarea" placeholder="在此粘贴或编写文本… 支持中文、英文、代码、Markdown，写完直接保存为 .txt 或 .html" spellcheck="true">你好，世界 👋

这是一个极简的文本编辑器。
你可以在这里写笔记、代码、或任何内容。

➜ 点击「下载 .txt」保存为纯文本文件。
➜ 点击「下载 .html」将其保存为网页文件。

—— 写完改 html 就行 ✨</textarea>
    </div>

    <!-- 状态栏 -->
    <div class="status-bar">
      <div class="hint">
        <span>📌</span> <span id="charCount">0</span> 字符 · <span id="lineCount">0</span> 行
      </div>
      <div class="counter">
        <span class="badge">UTF-8</span>  <span style="margin-left: 8px;">⚡ 即改即用</span>
      </div>
    </div>

    <!-- 脚注提示 -->
    <div class="footer-note">
      <strong>“txt 写完改 html 就行”</strong> —— 直接保存为 .html 文件，在浏览器中打开即显示为网页。
    </div>
  </div>

  <script>
    (function() {
      const textarea = document.getElementById('editorTextarea');
      const charCountSpan = document.getElementById('charCount');
      const lineCountSpan = document.getElementById('lineCount');

      // ----- 更新计数 -----
      function updateStats() {
        const text = textarea.value;
        const charCount = text.length;
        const lineCount = text === '' ? 0 : text.split('\n').length;
        charCountSpan.textContent = charCount;
        lineCountSpan.textContent = lineCount;
      }

      // 监听输入事件更新
      textarea.addEventListener('input', updateStats);

      // 初始统计
      updateStats();

      // ----- 清空 -----
      document.getElementById('clearBtn').addEventListener('click', function() {
        if (textarea.value.trim() === '') return;
        if (confirm('确定要清空所有内容吗？')) {
          textarea.value = '';
          updateStats();
          textarea.focus();
        }
      });

      // ----- 下载 .txt (纯文本) -----
      document.getElementById('downloadTxtBtn').addEventListener('click', function() {
        const content = textarea.value;
        if (content.trim() === '') {
          alert('📭 文本内容为空，请先输入一些内容。');
          return;
        }
        // 生成blob，utf-8编码
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        // 文件名：使用当前时间，也可自定义
        const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
        a.download = `笔记_${timestamp}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });

      // ----- 下载 .html (将文本包裹为网页) -----
      document.getElementById('downloadHtmlBtn').addEventListener('click', function() {
        const content = textarea.value;
        if (content.trim() === '') {
          alert('📭 文本内容为空，请先输入一些内容。');
          return;
        }

        // 对内容进行HTML转义（避免XSS，同时保留换行/空格样式）
        const escapedContent = content
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');

        // 构建完整的HTML文档 (保留文本格式: 换行转为<br>，空格保留)
        // 使用 white-space: pre-wrap 保留换行和空格，同时自动换行
        const htmlDoc = `<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📄 从文本生成 · 写完改HTML</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f7f5fc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      padding: 30px 20px;
    }
    .paper {
      background: #ffffff;
      max-width: 820px;
      width: 100%;
      border-radius: 32px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08), 0 8px 20px rgba(0, 0, 0, 0.04);
      padding: 40px 48px;
      border: 1px solid #edeaf5;
      transition: all 0.2s;
    }
    .paper-content {
      font-size: 1.05rem;
      line-height: 1.8;
      color: #1e1a2b;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }
    .paper-content::before {
      content: "✎ 文本快照";
      display: block;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #a19bbd;
      margin-bottom: 18px;
      border-bottom: 2px dashed #e8e3f0;
      padding-bottom: 12px;
    }
    .footer-meta {
      margin-top: 30px;
      border-top: 1px solid #edeaf5;
      padding-top: 22px;
      font-size: 0.8rem;
      color: #9b95b5;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .footer-meta span {
      background: #f4f2fa;
      padding: 4px 16px;
      border-radius: 40px;
    }
    @media (max-width: 550px) {
      .paper { padding: 28px 22px; }
      .paper-content { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <div class="paper">
    <div class="paper-content">${escapedContent}</div>
    <div class="footer-meta">
      <span>📅 ${new Date().toLocaleString()}</span>
      <span>🌐 从 .txt 生成 · 写完改HTML</span>
    </div>
  </div>
</body>
</html>`;

        const blob = new Blob([htmlDoc], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
        a.download = `网页_${timestamp}.html`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });

      // 额外小细节：点击下载后保留焦点
      document.querySelectorAll('.btn').forEach(btn => {
        btn.addEventListener('mousedown', (e) => {
          // 防止按钮点击时失焦
          e.preventDefault();
        });
        // 但为了点击后保留文本域焦点，我们使用常规click事件不影响
      });

      // 让文本域自动获得焦点（加载后）
      window.addEventListener('load', function() {
        textarea.focus();
        // 将光标移到末尾
        textarea.setSelectionRange(textarea.value.length, textarea.value.length);
      });

      // 提示用户快捷键（仅展示）
      console.log('📌 写完改HTML · 极简编辑器');
    })();
  </script>
</body>
</html>
